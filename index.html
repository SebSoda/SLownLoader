<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroDownloader 8-BIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: rgba(42, 42, 42, 0.85); /* Un poco de transparencia para el blur */
            --retro-green: #55ff55;
            --retro-dark-green: #008f11;
            --text-color: #e0e0e0;
            --border-black: #000000;
            --pixel-size: 4px;
        }

        /* FONDO DIFUMINADO */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Aquí busca el archivo BG. Asegúrate de que la extensión sea correcta */
            background: url('https://wallpaperaccess.com/full/2825810.gif') no-repeat center center fixed; 
            background-size: cover;
            filter: blur(8px); /* Ajusta el nivel de difuminado aquí */
            z-index: -1;
            transform: scale(1.1); /* Evita bordes blancos por el blur */
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            image-rendering: pixelated;
            font-size: 12px;
        }

        /* Simulación de scanlines (líneas de TV antigua) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border: var(--pixel-size) solid var(--border-black);
            box-shadow: 8px 8px 0px var(--border-black);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px); /* Difumina lo que está detrás del cuadro */
            position: relative;
            z-index: 2;
        }

        h1 {
            text-align: center;
            color: var(--retro-green);
            margin-bottom: 1rem;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px var(--border-black);
            font-size: 1.5rem;
        }

        /* CONTENEDOR DEL GIF */
        .gif-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .gif-container img {
            width: 120px; /* Ajusta el tamaño de tu gif */
            height: auto;
            image-rendering: pixelated;
        }

        .field-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--retro-green);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            background: #000;
            color: var(--retro-green);
            border: var(--pixel-size) solid var(--border-black);
            box-sizing: border-box;
            outline: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            width: 100%;
            padding: 20px;
            background-color: var(--retro-green);
            color: #000;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            text-transform: uppercase;
            border-top: var(--pixel-size) solid #aaffaa;
            border-left: var(--pixel-size) solid #aaffaa;
            border-right: var(--pixel-size) solid var(--retro-dark-green);
            border-bottom: var(--pixel-size) solid var(--retro-dark-green);
            box-shadow: 6px 6px 0px var(--border-black);
        }

        button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px var(--border-black);
        }

        #status {
            margin-top: 2rem;
            text-align: center;
            font-size: 10px;
            border: 2px dashed var(--retro-dark-green);
            padding: 10px;
            background: rgba(0,0,0,0.5);
        }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: var(--retro-green);
            color: #000;
            text-decoration: none;
            box-shadow: 4px 4px 0px #000;
        }

        .retro-loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: var(--retro-green);
            animation: blink 0.8s steps(2, start) infinite;
        }

        @keyframes blink { to { visibility: hidden; } }

        @media (max-width: 400px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <h1>VIDdownloader<br>v1.0</h1>
        
        <div class="gif-container">
            <img src="https://i.gifer.com/origin/9a/9a1e8d6ab3a8b3a972b31f5d83f8934d_w200.gif" alt="Retro Sprite">
        </div>
        
        <div class="field-group">
            <label>INSERT LINK:</label>
            <input type="text" id="url" placeholder="URL HERE...">
        </div>

        <div class="options-grid">
            <div class="field-group">
                <label>MODE:</label>
                <select id="downloadMode">
                    <option value="pro">VIDEO</option>
                    <option value="audio">AUDIO</option>
                </select>
            </div>
            <div class="field-group">
                <label>QUALITY:</label>
                <select id="videoQuality">
                    <option value="720">720P</option>
                    <option value="1080" selected>1080P</option>
                </select>
            </div>
        </div>

        <button id="btnDownload" onclick="processDownload()">>> CONVERT <<</button>

        <div id="status">WAITING FOR INPUT.</div>
    </div>

    <script>
        async function processDownload() {
    const urlInput = document.getElementById('url').value;
    const btn = document.getElementById('btnDownload');
    const status = document.getElementById('status');
    
    // Lista de instancias actualizadas a 2025/2026 que suelen soportar v10
    const instances = [
        'https://api.cobalt.tools', // Instancia oficial (si está activa)
        'https://cobalt-api.v06.co',
        'https://api.zybron.dev',
        'https://cobalt.hot-as.moe'
    ];

    if (!urlInput) {
        status.innerHTML = "<span style='color: #ff5555;'>[ERROR] NO LINK!</span>";
        return;
    }

    btn.disabled = true;
    status.innerHTML = '<div class="retro-loader"></div> CONNECTING TO V10...';

    for (let apiUrl of instances) {
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 
                    'Accept': 'application/json', 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    url: urlInput,
                    videoQuality: document.getElementById('videoQuality').value,
                    downloadMode: document.getElementById('downloadMode').value,
                    filenamePattern: "pretty",
                    // En v10, algunos parámetros han cambiado, pero estos suelen ser retrocompatibles
                })
            });

            if (!response.ok) throw new Error("Node Down");

            const data = await response.json();

            // En la nueva API, el resultado puede venir como 'url' o 'text' (si es error)
            if (data.url) {
                status.innerHTML = `
                    <p style="color: var(--retro-green);">[SUCCESS]</p>
                    <a href="${data.url}" class="download-link" target="_blank">DOWNLOAD FILE</a>`;
                btn.disabled = false;
                return;
            } else if (data.status === 'error') {
                throw new Error(data.text);
            }

        } catch (error) {
            console.warn(`Fallo en ${apiUrl}:`, error);
            status.innerHTML = `<div class="retro-loader"></div> TRYING ANOTHER NODE...`;
        }
    }

    status.innerHTML = "<span style='color: #ff5555;'>[FATAL ERROR]<br>V7 SHUTDOWN DETECTED.<br>UPDATING NODES...</span>";
    btn.disabled = false;
}
    </script>
</body>
</html>
